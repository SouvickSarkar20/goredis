version: '3.8'

services:

  goredis:
    build: .
    container_name: goredis
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - goredis_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - goredis
    restart: unless-stopped
    networks:
      - goredis_network

networks:
  goredis_network:
    driver: bridge