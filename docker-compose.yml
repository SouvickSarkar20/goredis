version: '3.8'

services:

  goredis:
    build: .
    container_name: goredis
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    ports:
      - "6379:6379"
    networks:
      - goredis_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/letsencrypt # Shared folder for certificates
      - ./nginx/www:/var/www/certbot # Shared folder for the ACME challenge
    depends_on:
      - goredis
    restart: unless-stopped
    networks:
      - goredis_network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    # This command wakes up every 12 hours and checks if renewal is needed
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - goredis_network

networks:
  goredis_network:
    driver: bridge