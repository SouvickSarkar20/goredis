events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Provide the ACME challenge path for Certbot on Port 80
    # And redirect everything else to HTTPS
    server {
        listen 80;
        server_name goredis.me;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Secure HTTPS Server
    server {
        listen 443 ssl;
        server_name goredis.me;

        # SSL Configuration (Certbot will save here)
        ssl_certificate /etc/letsencrypt/live/goredis.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/goredis.me/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://goredis:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
